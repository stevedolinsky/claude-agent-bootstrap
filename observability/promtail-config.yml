server:
  http_listen_port: 9080
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: agent-events
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            action: action
            event_type: event_type
            model: model
            repo: repo
          drop_malformed: true
      - labels:
          action:
          event_type:
          model:
          repo:
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05Z"
    static_configs:
      - targets: [localhost]
        labels:
          job: claude-agent
          __path__: /var/log/agent/agent-events.jsonl
