name: claude-agent

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: claude-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  promtail:
    image: grafana/promtail:3.4.2
    container_name: claude-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
      - ${EVENTS_FILE:?EVENTS_FILE must be set}:/var/log/agent/agent-events.jsonl:ro
      - promtail-positions:/tmp
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: claude-grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-agent}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/fleet-overview.json
    volumes:
      - ./provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: claude-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2
    container_name: claude-node-exporter
    pid: host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--no-collector.hwmon'
      - '--no-collector.thermal_zone'
      - '--no-collector.cpufreq'
      - '--no-collector.powersupplyclass'
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

volumes:
  loki-data:
    name: claude-agent-loki-data
  grafana-data:
    name: claude-agent-grafana-data
  prometheus-data:
    name: claude-agent-prometheus-data
  promtail-positions:
    name: claude-agent-promtail-positions
