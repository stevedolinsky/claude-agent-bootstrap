name: Agent Webhook — Issue Comment

on:
  issue_comment:
    types: [created]

jobs:
  notify-receiver:
    # Only fire for non-PR issue comments (PR comments handled by agent-webhook-pr-comment)
    if: |
      !github.event.issue.pull_request &&
      !contains(github.event.comment.user.login, '[bot]') &&
      !contains(github.event.comment.body, '<!-- claude-agent -->') &&
      !contains(github.event.comment.body, '· claude-sonnet-') &&
      !contains(github.event.comment.body, '· claude-opus-')
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          AGENT_SECRET: ${{ secrets.AGENT_WEBHOOK_SECRET }}
          RECEIVER_HOST: ${{ secrets.AGENT_RECEIVER_HOST }}
        run: |
          missing=""
          [ -z "$AGENT_SECRET" ] && missing="${missing} AGENT_WEBHOOK_SECRET"
          [ -z "$RECEIVER_HOST" ] && missing="${missing} AGENT_RECEIVER_HOST"
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secrets:${missing}"
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Send webhook to receiver
        env:
          AGENT_SECRET: ${{ secrets.AGENT_WEBHOOK_SECRET }}
          RECEIVER_HOST: ${{ secrets.AGENT_RECEIVER_HOST }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
          LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          echo "::add-mask::$AGENT_SECRET"

          PAYLOAD=$(jq -n \
            --arg type "issue_comment" \
            --argjson number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "$ISSUE_BODY" \
            --arg issue_state "$ISSUE_STATE" \
            --arg comment_body "$COMMENT_BODY" \
            --arg comment_author "$COMMENT_AUTHOR" \
            --argjson comment_id "${COMMENT_ID:-0}" \
            --arg repo "$REPO" \
            --argjson labels "$LABELS" \
            '{type: $type, number: $number, issue_title: $issue_title, issue_body: $issue_body, issue_state: $issue_state, comment_body: $comment_body, comment_author: $comment_author, comment_id: $comment_id, repo: $repo, labels: $labels}')

          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$AGENT_SECRET" | awk '{print $2}')"

          echo "Sending webhook to ${RECEIVER_HOST}:9876..."

          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "http://${RECEIVER_HOST}:9876/webhook" \
            -H "Content-Type: application/json" \
            -H "X-Agent-Signature: $SIGNATURE" \
            -d "$PAYLOAD" \
            --max-time 10 \
            --retry 2) || true

          RESPONSE=$(cat /tmp/response.txt 2>/dev/null || echo "no response")

          if [ "$HTTP_CODE" = "202" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Webhook delivered (HTTP $HTTP_CODE): $RESPONSE"
          elif [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" = "000" ]; then
            echo "::error::Could not connect to receiver at ${RECEIVER_HOST}:9876. Is the receiver running? (cd ~/claude-agent-bootstrap && python3 -m receiver)"
            exit 1
          else
            echo "::error::Receiver returned HTTP $HTTP_CODE: $RESPONSE"
            exit 1
          fi
