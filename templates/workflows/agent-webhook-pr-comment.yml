name: Agent Webhook — PR Comment

on:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  notify-receiver:
    # Only fire for PR comments (issue_comment fires for both issues and PRs)
    if: |
      (github.event_name == 'pull_request_review_comment' ||
       (github.event_name == 'issue_comment' && github.event.issue.pull_request)) &&
      !contains(github.event.comment.user.login, '[bot]') &&
      !contains(github.event.comment.body, '<!-- claude-agent -->') &&
      !contains(github.event.comment.body, '· claude-sonnet-') &&
      !contains(github.event.comment.body, '· claude-opus-')
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Send webhook to receiver
        env:
          AGENT_SECRET: ${{ secrets.AGENT_WEBHOOK_SECRET }}
          RECEIVER_HOST: ${{ secrets.AGENT_RECEIVER_HOST }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_REVIEW: ${{ github.event.pull_request.number }}
          PR_BRANCH_REVIEW: ${{ github.event.pull_request.head.ref }}
          PR_STATE_REVIEW: ${{ github.event.pull_request.state }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          echo "::add-mask::$AGENT_SECRET"

          # Determine PR number and branch based on event type
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            PR_NUMBER="$PR_NUMBER_REVIEW"
            PR_BRANCH="$PR_BRANCH_REVIEW"
            PR_STATE="$PR_STATE_REVIEW"
          else
            PR_NUMBER="$ISSUE_NUMBER"
            PR_BRANCH=""
            PR_STATE="$ISSUE_STATE"
          fi

          PAYLOAD=$(jq -n \
            --arg type "pr_comment" \
            --argjson pr_number "${PR_NUMBER:-0}" \
            --arg comment_body "$COMMENT_BODY" \
            --arg comment_author "$COMMENT_AUTHOR" \
            --arg pr_branch "$PR_BRANCH" \
            --arg repo "$REPO" \
            --arg pr_state "$PR_STATE" \
            --argjson comment_id "${COMMENT_ID:-0}" \
            '{type: $type, pr_number: $pr_number, number: $pr_number, comment_body: $comment_body, comment_author: $comment_author, pr_branch: $pr_branch, repo: $repo, pr_state: $pr_state, comment_id: $comment_id}')

          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$AGENT_SECRET" | awk '{print $2}')"

          curl -s -X POST "http://${RECEIVER_HOST}:9876/webhook" \
            -H "Content-Type: application/json" \
            -H "X-Agent-Signature: $SIGNATURE" \
            -d "$PAYLOAD" \
            --max-time 10 \
            --retry 2
